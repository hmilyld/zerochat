name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  # 创建Release
  create-release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Generate release notes
        id: release-notes
        run: |
          # 获取上一个tag
          PREV_TAG=$(git describe --tags --abbrev=0 HEAD^ 2>/dev/null || echo "")
          
          if [ -n "$PREV_TAG" ]; then
            echo "Generating release notes from $PREV_TAG to ${{ github.ref_name }}"
            CHANGELOG=$(git log --oneline "$PREV_TAG..HEAD" --no-merges)
          else
            echo "Generating release notes for all commits"
            CHANGELOG=$(git log --oneline --no-merges)
          fi
          
          echo "changelog<<EOF" >> $GITHUB_OUTPUT
          echo "$CHANGELOG" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

      - name: Create GitHub Release
        uses: actions/create-release@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tag_name: ${{ github.ref_name }}
          release_name: Release ${{ github.ref_name }}
          body: |
            ## Changes
            
            ${{ steps.release-notes.outputs.changelog }}
            
            ## Docker Images
            
            ```bash
            # 统一镜像
            docker pull hmilyld/zerochat:${{ github.ref_name }}
            docker pull hmilyld/zerochat:latest
            
            # 三镜像架构
            docker pull hmilyld/zerochat-backend:${{ github.ref_name }}
            docker pull hmilyld/zerochat-frontend:${{ github.ref_name }}
            ```
            
            ## Installation
            
            ```bash
            # 使用docker-compose
            docker-compose -f docker-compose.unified.yml up -d
            
            # 或使用docker run
            docker run -d \
              --name zerochat \
              -p 3001:3001 \
              -p 5173:5173 \
              -e REDIS_PASSWORD=your_password \
              hmilyld/zerochat:${{ github.ref_name }}
            ```
          draft: false
          prerelease: false

  # 构建并推送镜像
  build-and-push:
    runs-on: ubuntu-latest
    needs: create-release
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Extract version from tag
        id: version
        run: |
          VERSION=${{ github.ref_name }}
          VERSION=${VERSION#v}
          echo "version=$VERSION" >> $GITHUB_OUTPUT

      - name: Build and push unified image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: Dockerfile.unified
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ env.NAMESPACE }}/zerochat:${{ steps.version.outputs.version }}
            ${{ env.REGISTRY }}/${{ env.NAMESPACE }}/zerochat:latest
          build-args: |
            APP_VERSION=${{ steps.version.outputs.version }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build and push backend image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: packages/backend/Dockerfile
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ env.NAMESPACE }}/zerochat-backend:${{ steps.version.outputs.version }}
            ${{ env.REGISTRY }}/${{ env.NAMESPACE }}/zerochat-backend:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build and push frontend image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: packages/frontend/Dockerfile
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ env.NAMESPACE }}/zerochat-frontend:${{ steps.version.outputs.version }}
            ${{ env.REGISTRY }}/${{ env.NAMESPACE }}/zerochat-frontend:latest
          build-args: |
            APP_VERSION=${{ steps.version.outputs.version }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # 部署到生产环境
  deploy-production:
    runs-on: ubuntu-latest
    needs: build-and-push
    environment: production
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Deploy to production server
        uses: appleboy/ssh-action@v1.0.0
        with:
          host: ${{ secrets.PRODUCTION_SERVER_HOST }}
          username: ${{ secrets.PRODUCTION_SERVER_USERNAME }}
          key: ${{ secrets.PRODUCTION_SERVER_SSH_KEY }}
          script: |
            cd /path/to/zerochat
            
            # 拉取最新镜像
            docker pull hmilyld/zerochat:${{ github.ref_name }}
            
            # 停止旧容器
            docker stop zerochat-app 2>/dev/null || true
            docker rm zerochat-app 2>/dev/null || true
            
            # 启动新容器
            docker run -d \
              --name zerochat-app \
              --restart unless-stopped \
              -p 3001:3001 \
              -p 5173:5173 \
              -p 127.0.0.1:6379:6379 \
              -e REDIS_PASSWORD="${{ secrets.PRODUCTION_REDIS_PASSWORD }}" \
              -e CORS_ORIGIN="${{ secrets.PRODUCTION_CORS_ORIGIN }}" \
              -v zerochat_redis_data:/data \
              hmilyld/zerochat:${{ github.ref_name }}
            
            # 等待服务启动
            sleep 15
            
            # 检查服务状态
            if docker ps | grep -q zerochat-app; then
              echo "✅ 生产环境部署成功"
            else
              echo "❌ 生产环境部署失败"
              docker logs zerochat-app
              exit 1
            fi

      - name: Health check
        run: |
          sleep 30
          if curl -f http://${{ secrets.PRODUCTION_SERVER_HOST }}:3001/health; then
            echo "✅ 生产环境健康检查通过"
          else
            echo "❌ 生产环境健康检查失败"
            exit 1
          fi
