name: CI/CD Pipeline

on:
  push:
    branches: [master, develop]
  pull_request:
    branches: [master]
  release:
    types: [published]

env:
  REGISTRY: docker.io
  NAMESPACE: hmilyld

jobs:
  # 代码检查和测试
  lint-and-test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install pnpm
        run: npm install -g pnpm@10

      - name: Get pnpm store directory
        shell: bash
        run: echo "STORE_PATH=$(pnpm store path --silent)" >> $GITHUB_OUTPUT
        id: pnpm-cache

      - name: Cache pnpm
        uses: actions/cache@v4
        with:
          path: ${{ steps.pnpm-cache.outputs.STORE_PATH }}
          key: ${{ runner.os }}-pnpm-store-${{ hashFiles('**/pnpm-lock.yaml') }}
          restore-keys: |
            ${{ runner.os }}-pnpm-store-

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run linting
        run: pnpm run lint || true

      - name: Run type check
        run: pnpm run typecheck || true

      - name: Run tests
        run: pnpm run test || true

  # 构建统一镜像
  build-unified:
    runs-on: ubuntu-latest
    needs: lint-and-test
    if: github.event_name != 'pull_request'
    outputs:
      image-tag: ${{ steps.meta.outputs.version }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.NAMESPACE }}/zerochat
          tags: |
            type=ref,event=branch
            type=ref,event=tag
            type=sha,prefix=
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Build and push unified image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: Dockerfile.unified
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: |
            APP_VERSION=${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # 构建三镜像架构（兼容）
  build-legacy:
    runs-on: ubuntu-latest
    needs: lint-and-test
    if: github.event_name != 'pull_request'
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build backend image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: packages/backend/Dockerfile
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ env.NAMESPACE }}/zerochat-backend:latest
            ${{ env.REGISTRY }}/${{ env.NAMESPACE }}/zerochat-backend:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build frontend image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: packages/frontend/Dockerfile
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ env.NAMESPACE }}/zerochat-frontend:latest
            ${{ env.REGISTRY }}/${{ env.NAMESPACE }}/zerochat-frontend:${{ github.sha }}
          build-args: |
            APP_VERSION=${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # 部署到服务器
  deploy:
    runs-on: ubuntu-latest
    needs: build-unified
    if: github.event_name == 'push' && github.ref == 'refs/heads/master'
    environment: production
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Deploy to server
        uses: appleboy/ssh-action@v1.0.0
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USERNAME }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          script: |
            cd /path/to/zerochat
            
            # 拉取最新镜像
            docker pull ${{ env.REGISTRY }}/${{ env.NAMESPACE }}/zerochat:latest
            
            # 停止旧容器
            docker stop zerochat-app 2>/dev/null || true
            docker rm zerochat-app 2>/dev/null || true
            
            # 启动新容器
            docker run -d \
              --name zerochat-app \
              --restart unless-stopped \
              -p 3001:3001 \
              -p 5173:5173 \
              -p 127.0.0.1:6379:6379 \
              -e REDIS_PASSWORD="${{ secrets.REDIS_PASSWORD }}" \
              -e CORS_ORIGIN="${{ secrets.CORS_ORIGIN }}" \
              -v zerochat_redis_data:/data \
              ${{ env.REGISTRY }}/${{ env.NAMESPACE }}/zerochat:latest
            
            # 等待服务启动
            sleep 10
            
            # 检查服务状态
            if docker ps | grep -q zerochat-app; then
              echo "✅ 部署成功"
            else
              echo "❌ 部署失败"
              docker logs zerochat-app
              exit 1
            fi

      - name: Health check
        run: |
          sleep 30
          if curl -f http://${{ secrets.SERVER_HOST }}:3001/health; then
            echo "✅ 健康检查通过"
          else
            echo "❌ 健康检查失败"
            exit 1
          fi

  # 发布Release
  release:
    runs-on: ubuntu-latest
    needs: build-unified
    if: github.event_name == 'release'
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Generate changelog
        id: changelog
        run: |
          CHANGELOG=$(git log --oneline --since="${{ github.event.release.created_at }}" --until=$(date -u +%Y-%m-%dT%H:%M:%SZ) --no-merges)
          echo "changelog<<EOF" >> $GITHUB_OUTPUT
          echo "$CHANGELOG" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

      - name: Update release notes
        uses: actions/github-script@v7
        with:
          script: |
            const changelog = `${{ steps.changelog.outputs.changelog }}`;
            const body = `## Changes\n\n${changelog}\n\n## Docker Images\n\n- \`docker pull hmilyld/zerochat:${{ github.event.release.tag_name }}\`\n- \`docker pull hmilyld/zerochat:latest\``;
            
            await github.rest.repos.updateRelease({
              owner: context.repo.owner,
              repo: context.repo.repo,
              release_id: context.payload.release.id,
              body: body
            });
