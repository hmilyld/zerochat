name: Code Quality

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  # 代码质量检查
  quality:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'pnpm'

      - name: Install pnpm
        uses: pnpm/action-setup@v2
        with:
          version: 10

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run ESLint
        run: pnpm run lint
        continue-on-error: true

      - name: Run Prettier check
        run: pnpm run format:check || true

      - name: Run TypeScript check
        run: pnpm run typecheck || true

  # 测试覆盖率
  test-coverage:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'pnpm'

      - name: Install pnpm
        uses: pnpm/action-setup@v2
        with:
          version: 10

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run tests with coverage
        run: pnpm run test:coverage || true

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v3
        if: always()
        with:
          files: ./coverage/lcov.info
          flags: unittests
          name: codecov-umbrella
          fail_ci_if_error: false

  # 文档检查
  docs:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Check README exists
        run: |
          if [ ! -f README.md ]; then
            echo "❌ README.md not found"
            exit 1
          fi
          echo "✅ README.md exists"

      - name: Check documentation
        run: |
          if [ ! -f UNIFIED_DEPLOY.md ]; then
            echo "⚠️ UNIFIED_DEPLOY.md not found"
          fi
          if [ ! -f DOCKER_SCRIPTS.md ]; then
            echo "⚠️ DOCKER_SCRIPTS.md not found"
          fi

      - name: Check Dockerfile
        run: |
          if [ ! -f Dockerfile.unified ]; then
            echo "❌ Dockerfile.unified not found"
            exit 1
          fi
          echo "✅ Dockerfile.unified exists"

      - name: Check scripts
        run: |
          for script in docker-build.sh docker-push.sh docker-deploy.sh docker-status.sh docker-logs.sh docker-cleanup.sh; do
            if [ ! -f "scripts/$script" ]; then
              echo "❌ scripts/$script not found"
              exit 1
            fi
            if [ ! -x "scripts/$script" ]; then
              echo "⚠️ scripts/$script is not executable"
            fi
          done
          echo "✅ All scripts exist"

  # 性能检查
  performance:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'pnpm'

      - name: Install pnpm
        uses: pnpm/action-setup@v2
        with:
          version: 10

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build project
        run: pnpm run build

      - name: Check bundle size
        run: |
          echo "📦 Bundle size analysis:"
          du -sh packages/frontend/dist 2>/dev/null || echo "Frontend dist not found"
          du -sh packages/backend/dist 2>/dev/null || echo "Backend dist not found"
